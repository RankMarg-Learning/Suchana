name: Backend CI/CD (Docker + AWS SSH)

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  deploy: 
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: DOCKERHUB_REPO
          script: |
            echo "Pulling latest image: $DOCKERHUB_REPO:latest"
            sudo docker pull $DOCKERHUB_REPO:latest

            echo "Stopping old container..."
            sudo docker stop rankmarg-backend || true
            sudo docker rm rankmarg-backend || true

            echo "Starting new container..."
            sudo docker run -d --name rankmarg-backend -p 3001:3001 --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              $DOCKERHUB_REPO:latest

            echo "Cleaning up old images..."
            sudo docker image prune -f

            echo "Restarting Nginx..."
            sudo systemctl restart nginx || true

            echo "🚀 Deployment successful!"